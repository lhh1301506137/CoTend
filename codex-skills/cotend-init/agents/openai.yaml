interface:
  display_name: "CoTend Init"
  short_description: "Auto init/update workflow"
  default_prompt: "Use $cotend-init to auto-initialize, update, repair, migrate, or resume the current project's AI development framework. Route to cotend-project-init Auto Mode, decide Trellis active/dormant/recommended/not needed, configure Plan Tree index plus node docs, user-readable expanded understanding, PROJECT-DECISION-LOG user/grill decision ledger with resulting_changes, PROJECT-KNOWLEDGE-CHANGELOG audit trail, intake artifact handling for user idea/requirements txt/md files, and Acceptance/Test Harness routing for Playwright/browser/Chrome verification with progressive active-path loading and user confirmation for new/inferred/material high-level route or understanding changes, apply cold-path framework-change evaluation only for framework/skill behavior changes, reconcile CoTend + Karpathy + grill-me, verify CodeGraph/project-local index isolation, safely initialize project-local CodeGraph indexes when appropriate, and report whether it is safe to continue using a layered initialization report with Initialization Decision Summary first. A bare continue token does not answer pending human-only questions; unrelated preauthorized work may continue when safe."
