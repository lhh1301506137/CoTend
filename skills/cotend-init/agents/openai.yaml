  short_description: "Auto init/update workflow"
  default_prompt: "Use $cotend-init as the single start or resume entry. Delegate to cotend-project-init Auto Mode to inspect before asking, classify fresh init, legacy update, partial repair, current resume, or blocked human decision, preserve project truth, configure only safe workflow state, and report an Initialization Decision Summary plus readiness. A bare continue token never answers a pending human-only question."
