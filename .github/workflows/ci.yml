name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}

      - name: Compile Python sources
        run: python -m compileall -q scripts src tests

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Verify repository contracts
        run: python scripts/check_repository.py

      - name: Verify Plugin candidate and submission materials
        run: |
          python scripts/verify_codex_plugin_package.py --repository-only
          python scripts/verify_plugin_submission_materials.py

      - name: Rehearse reviewer fixtures
        run: python scripts/prepare_reviewer_fixtures.py

      - name: Build deterministic release archive
        run: python scripts/build_release_archive.py --check-tag v0.1.0-rc.1

      - name: Verify GitHub repository maturity
        run: python scripts/verify_repository_maturity.py --no-build

      - name: Upload release candidate artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cotend-0.1.0-rc.1
          path: |
            dist/cotend-0.1.0-rc.1.zip
            dist/cotend-0.1.0-rc.1.zip.sha256
          if-no-files-found: error
          retention-days: 14
