name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install pinned CI dependencies
        run: python -m pip install --disable-pip-version-check --requirement requirements-ci.txt

      - name: Compile Python sources
        run: python -m compileall -q scripts src tests

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Verify repository contracts
        run: python scripts/check_repository.py

      - name: Verify Plugin candidate and submission materials
        run: |
          python scripts/verify_codex_plugin_package.py --repository-only
          python scripts/verify_plugin_submission_materials.py

      - name: Rehearse reviewer fixtures
        run: python scripts/prepare_reviewer_fixtures.py

      - name: Build deterministic release archive
        run: python scripts/build_release_archive.py --check-tag v0.1.0-rc.1

      - name: Verify GitHub repository maturity
        run: python scripts/verify_repository_maturity.py --no-build

      - name: Upload release candidate artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cotend-0.1.0-rc.1
          path: |
            dist/cotend-0.1.0-rc.1.zip
            dist/cotend-0.1.0-rc.1.zip.sha256
          if-no-files-found: error
          retention-days: 14
